name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-tests:
    name: Testes unitários (JDK 26)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven

      - name: Rodar testes unitários
        run: |
          chmod +x mvnw
          ./mvnw -B test -Dtest='*ServiceTest' -Dsurefire.failIfNoSpecifiedTests=false

  coverage:
    name: Cobertura (JaCoCo, JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JaCoCo ainda não instrumenta o bytecode do Java 26; a cobertura é
      # gerada compilando em Java 21 (profile -Pcoverage). Não afeta produção.
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Gerar relatório de cobertura
        run: |
          chmod +x mvnw
          ./mvnw -B -Pcoverage test -Dtest='*ServiceTest' -Dsurefire.failIfNoSpecifiedTests=false

      - name: Publicar relatório JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
