<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica — Portal do Paciente</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="patient">
<main class="auth-container">
    <div class="auth-card">
        <h1>🩺 Portal do Paciente</h1>
        <p class="subtitle">Acesse seus agendamentos e histórico médico</p>

        <nav class="tabs">
            <button class="tab active" data-tab="login">Entrar</button>
            <button class="tab" data-tab="register">Cadastrar</button>
        </nav>

        <div id="message" class="message hidden"></div>

        <form id="form-login" class="tab-content" novalidate>
            <label for="login-cpf">CPF <small>(somente números)</small></label>
            <input id="login-cpf" type="text" maxlength="11" required
                   autocomplete="username" placeholder="00000000000">
            <span class="field-error hidden" data-field="login-cpf"></span>

            <label for="login-pass">Senha</label>
            <div class="input-pass-wrap">
                <input id="login-pass" type="password" required autocomplete="current-password">
                <button type="button" class="toggle-pass" aria-label="Mostrar senha">👁</button>
            </div>
            <span class="field-error hidden" data-field="login-pass"></span>

            <div class="captcha-widget">
                <div class="captcha-inner">
                    <div class="captcha-box" id="captcha-box-login" role="checkbox" aria-checked="false" tabindex="0"></div>
                    <span class="captcha-label">Não sou um robô</span>
                </div>
                <div class="captcha-brand">
                    <div class="captcha-brand-icon">🔒</div>
                    <div>Segurança</div>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btn-login-submit" disabled>Entrar</button>
        </form>

        <form id="form-register" class="tab-content hidden" novalidate>
            <label for="reg-nome">Nome completo</label>
            <input id="reg-nome" type="text" required minlength="3" maxlength="100">
            <span class="field-error hidden" data-field="reg-nome"></span>

            <label for="reg-cpf">CPF <small>(somente números)</small></label>
            <input id="reg-cpf" type="text" maxlength="11" required placeholder="00000000000">
            <span class="field-error hidden" data-field="reg-cpf"></span>

            <label for="reg-nascimento">Data de nascimento</label>
            <input id="reg-nascimento" type="date" required>
            <span class="field-error hidden" data-field="reg-nascimento"></span>

            <label for="reg-email">E-mail</label>
            <input id="reg-email" type="email" required>
            <span class="field-error hidden" data-field="reg-email"></span>

            <label for="reg-pass">Senha <small>(mín. 8 caracteres)</small></label>
            <div class="input-pass-wrap">
                <input id="reg-pass" type="password" required minlength="8">
                <button type="button" class="toggle-pass" aria-label="Mostrar senha">👁</button>
            </div>
            <span class="field-error hidden" data-field="reg-pass"></span>

            <div class="captcha-widget">
                <div class="captcha-inner">
                    <div class="captcha-box" id="captcha-box-reg" role="checkbox" aria-checked="false" tabindex="0"></div>
                    <span class="captcha-label">Não sou um robô</span>
                </div>
                <div class="captcha-brand">
                    <div class="captcha-brand-icon">🔒</div>
                    <div>Segurança</div>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btn-reg-submit" disabled>Criar conta</button>
        </form>

        <p class="portal-link">
            É funcionário? <a href="index.html">Acesse o Portal da Equipe</a>
        </p>
    </div>
</main>
<script src="js/patient-auth.js"></script>
</body>
</html>
