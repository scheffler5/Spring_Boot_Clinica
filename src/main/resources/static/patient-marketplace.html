<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica — Agendar Consulta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="patient">
<header class="topbar">
    <h1>🩺 Clínica</h1>
    <span class="topbar-info" id="topbar-name"></span>
    <nav style="display:flex;gap:8px;align-items:center">
        <a href="patient-dashboard.html" class="btn-logout" style="text-decoration:none">Minha Área</a>
        <button id="btn-logout" class="btn-logout">Sair</button>
    </nav>
</header>

<main class="patient-dashboard">
    <div id="message" class="message hidden"></div>

    <div class="welcome-banner">
        <h2 id="welcome-name">Olá!</h2>
        <p>Encontre um médico e agende sua consulta</p>
    </div>

    <div class="card">
        <h2>🔍 Buscar médicos</h2>
        <label for="filtro-especialidade">Especialidade</label>
        <select id="filtro-especialidade">
            <option value="">Todas as especialidades</option>
        </select>
    </div>

    <div id="medicos-grid" class="card-grid">
        <p class="empty-state">Carregando médicos...</p>
    </div>

    <!-- Painel de agendamento (aparece ao escolher um médico) -->
    <div id="booking-panel" class="card hidden">
        <h2>📅 Agendar com <span id="booking-medico-nome"></span></h2>
        <p id="booking-medico-info" style="color:var(--muted);font-size:13px;margin-bottom:12px"></p>

        <label for="booking-data">Escolha o dia</label>
        <input id="booking-data" type="date">

        <div id="slots-container" style="margin-top:16px">
            <p class="empty-state">Selecione uma data para ver os horários.</p>
        </div>
    </div>
</main>

<script src="js/patient-marketplace.js"></script>
</body>
</html>
