<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica — Agendar Consulta</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="patient">
<header class="topbar">
    <h1>🩺 Clínica</h1>
    <span class="topbar-info" id="topbar-name"></span>
    <button id="btn-logout" class="btn-logout">Sair</button>
</header>

<main class="patient-dashboard">
    <div id="message" class="message hidden"></div>

    <div class="welcome-banner">
        <h2 id="welcome-name">Olá!</h2>
        <p>Encontre um médico e agende sua consulta</p>
    </div>

    <div class="card">
        <h2>🔍 Buscar médicos</h2>
        <p style="color:var(--muted);font-size:14px">Em desenvolvimento — Task C</p>
    </div>
</main>

<script src="js/patient-marketplace.js"></script>
</body>
</html>
