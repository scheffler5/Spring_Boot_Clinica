<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica — Acesso Médico</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="auth-container">
    <div class="auth-card">
        <h1>🏥 Clínica</h1>
        <p class="subtitle">Portal Médico</p>

        <nav class="tabs">
            <button class="tab active" data-tab="login">Entrar</button>
            <button class="tab" data-tab="register">Criar conta</button>
        </nav>

        <div id="message" class="message hidden"></div>

        <form id="form-login" class="tab-content" novalidate>
            <label for="login-user">Login</label>
            <input id="login-user" type="text" required autocomplete="username">
            <span class="field-error hidden" data-field="login-user"></span>

            <label for="login-pass">Senha</label>
            <div class="input-pass-wrap">
                <input id="login-pass" type="password" required autocomplete="current-password">
                <button type="button" class="toggle-pass" aria-label="Mostrar senha">👁</button>
            </div>
            <span class="field-error hidden" data-field="login-pass"></span>

            <div class="captcha-widget">
                <div class="captcha-inner">
                    <div class="captcha-box" id="captcha-box-login" role="checkbox" aria-checked="false" tabindex="0"></div>
                    <span class="captcha-label">Não sou um robô</span>
                </div>
                <div class="captcha-brand">
                    <div class="captcha-brand-icon">🔒</div>
                    <div>Segurança</div>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btn-login-submit" disabled>Entrar</button>
        </form>

        <form id="form-register" class="tab-content hidden" novalidate>
            <label for="reg-user">Login</label>
            <input id="reg-user" type="text" required minlength="3" maxlength="50">
            <span class="field-error hidden" data-field="reg-user"></span>

            <label for="reg-pass">Senha <small>(mín. 8 caracteres)</small></label>
            <div class="input-pass-wrap">
                <input id="reg-pass" type="password" required minlength="8">
                <button type="button" class="toggle-pass" aria-label="Mostrar senha">👁</button>
            </div>
            <span class="field-error hidden" data-field="reg-pass"></span>

            <div class="captcha-widget">
                <div class="captcha-inner">
                    <div class="captcha-box" id="captcha-box-reg" role="checkbox" aria-checked="false" tabindex="0"></div>
                    <span class="captcha-label">Não sou um robô</span>
                </div>
                <div class="captcha-brand">
                    <div class="captcha-brand-icon">🔒</div>
                    <div>Segurança</div>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btn-reg-submit" disabled>Criar conta</button>
        </form>

        <p class="portal-link">
            É paciente? <a href="patient-login.html">Acesse o Portal do Paciente</a>
        </p>
    </div>
</main>
<script src="js/auth.js"></script>
</body>
</html>
