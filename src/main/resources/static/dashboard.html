<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica — Dashboard Médico</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard-medico.css">
    <link rel="stylesheet" href="css/tour.css">
    <script src="js/fullcalendar.min.js"></script>
</head>
<body>
<header class="topbar">
    <h1>🏥 Clínica</h1>
    <span class="topbar-info" id="topbar-nome"></span>
    
    <button id="btn-logout" class="btn-logout">Sair</button>
</header>

<nav class="dashboard-nav">
    <button class="nav-tab active" data-section="agenda">📅 Agenda</button>
    <button class="nav-tab" data-section="disponibilidade">🕒 Disponibilidade</button>
    <button class="nav-tab" data-section="estatisticas">📊 Estatísticas</button>
    <button class="nav-tab" data-section="perfil">⚙️ Perfil</button>
</nav>

<main class="dashboard-main">

    <section id="section-agenda" class="dashboard-section">
        <div class="stats-bar" id="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="stat-atendidos">—</div>
                <div class="stat-label">Atendidos este mês</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-agendados">—</div>
                <div class="stat-label">Agendamentos futuros</div>
            </div>
            <div class="stat-card green">
                <div class="stat-value" id="stat-receita">—</div>
                <div class="stat-label">Receita realizada</div>
            </div>
            <div class="stat-card blue">
                <div class="stat-value" id="stat-projecao">—</div>
                <div class="stat-label">Projeção futura</div>
            </div>
        </div>

        <div class="card" style="margin-top:20px">
            <div id="calendar"></div>
        </div>
    </section>

    <section id="section-disponibilidade" class="dashboard-section hidden">
        <div class="card">
            <h2>Minha disponibilidade</h2>
            <div id="disponibilidade-list" style="margin-bottom:24px"></div>

            <h3 style="margin-bottom:12px;font-size:15px;color:var(--primary-dark)">Adicionar horário</h3>
            <form id="form-disponibilidade" novalidate>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
                    <div>
                        <label for="dia-semana">Dia da semana</label>
                        <select id="dia-semana" required>
                            <option value="">Selecione...</option>
                            <option value="MONDAY">Segunda-feira</option>
                            <option value="TUESDAY">Terça-feira</option>
                            <option value="WEDNESDAY">Quarta-feira</option>
                            <option value="THURSDAY">Quinta-feira</option>
                            <option value="FRIDAY">Sexta-feira</option>
                            <option value="SATURDAY">Sábado</option>
                            <option value="SUNDAY">Domingo</option>
                        </select>
                    </div>
                    <div>
                        <label for="hora-inicio">Início do atendimento</label>
                        <input id="hora-inicio" type="time" required>
                    </div>
                    <div>
                        <label for="hora-fim">Fim do atendimento</label>
                        <input id="hora-fim" type="time" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top:16px;width:auto;padding:10px 24px">
                    Adicionar horário
                </button>
            </form>
        </div>
    </section>

    <section id="section-estatisticas" class="dashboard-section hidden">
        <div class="card">
            <h2>📊 Estatísticas mensais</h2>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
                <input type="month" id="mes-selecionado"
                       style="padding:8px 12px;border:1px solid var(--border);border-radius:8px">
                <button id="btn-atualizar-stats" class="btn-secondary">Atualizar</button>
            </div>
            <div class="stats-bar" id="stats-detalhado"></div>
        </div>
    </section>

    <!-- ABA PERFIL -->
    <section id="section-perfil" class="dashboard-section hidden">
        <div class="card" style="max-width:680px;margin:0 auto">
            <h2 style="margin-bottom:24px">⚙️ Configurações do perfil</h2>

            <div id="perfil-message" class="message hidden" style="margin-bottom:16px"></div>

            <!-- Foto de perfil -->
            <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid #f0f0f0">
                <div id="foto-container" style="position:relative;cursor:pointer" onclick="document.getElementById('foto-input').click()" title="Clique para alterar a foto">
                    <div id="foto-avatar" style="width:90px;height:90px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;border:3px solid var(--border)">
                        🩺
                    </div>
                    <div style="position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid #fff">📷</div>
                </div>
                <div>
                    <p style="font-weight:600;margin-bottom:4px">Foto de perfil</p>
                    <p style="font-size:13px;color:var(--muted)">JPEG, PNG ou WebP · máximo 5 MB</p>
                    <button class="btn-secondary" style="margin-top:8px;font-size:13px" onclick="document.getElementById('foto-input').click()">Alterar foto</button>
                </div>
                <input type="file" id="foto-input" accept="image/jpeg,image/png,image/webp" style="display:none">
            </div>

            <!-- Dados do perfil -->
            <form id="form-perfil-settings" novalidate>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                    <div style="grid-column:1/-1">
                        <label for="s-nome">Nome exibido</label>
                        <input id="s-nome" type="text" maxlength="100" placeholder="Como aparece para os pacientes">
                    </div>
                    <div>
                        <label for="s-crm">CRM</label>
                        <input id="s-crm" type="text" maxlength="20" placeholder="123456/SP">
                    </div>
                    <div>
                        <label for="s-cidade">Cidade</label>
                        <input id="s-cidade" type="text" maxlength="100" placeholder="São Paulo, SP">
                    </div>
                    <div>
                        <label for="s-especialidade">Especialidade</label>
                        <select id="s-especialidade">
                            <option value="">Selecione...</option>
                        </select>
                    </div>
                    <div>
                        <label for="s-valor">Valor da consulta (R$)</label>
                        <input id="s-valor" type="number" min="0" step="0.01" placeholder="350,00">
                    </div>
                    <div>
                        <label for="s-duracao">Duração da consulta</label>
                        <select id="s-duracao">
                            <option value="30">30 minutos</option>
                            <option value="45">45 minutos</option>
                            <option value="60">60 minutos</option>
                            <option value="90">90 minutos</option>
                        </select>
                    </div>
                    <div>
                        <label for="s-universidade">Universidade de formação</label>
                        <input id="s-universidade" type="text" maxlength="150" placeholder="Ex: Universidade de São Paulo (USP)">
                    </div>
                    <div>
                        <label for="s-ano-formacao">Ano de formação</label>
                        <input id="s-ano-formacao" type="number" min="1950" max="2030" placeholder="Ex: 2009">
                    </div>
                    <div style="grid-column:1/-1">
                        <label for="s-descricao">Descrição / Apresentação</label>
                        <textarea id="s-descricao" maxlength="2000" rows="4"
                            style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;resize:vertical"
                            placeholder="Conte um pouco sobre sua trajetória e especialização..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="margin-top:24px">
                    Salvar alterações
                </button>
            </form>
        </div>
    </section>

</main>

<!-- Modal: detalhes da consulta -->
<div id="modal-consulta" class="modal hidden">
    <div class="modal-content" style="max-width:380px">
        <button class="modal-fechar" id="modal-fechar">✕</button>
        <h3 id="modal-titulo" style="margin-bottom:14px;padding-right:24px"></h3>
        <div id="modal-corpo"></div>
        <button id="modal-btn-cancelar" class="btn-cancelar hidden"
                style="width:100%;margin-top:16px;padding:11px;font-size:14px">
            Cancelar esta consulta
        </button>
    </div>
</div>

<div id="message" class="message hidden"
     style="position:fixed;bottom:20px;right:20px;max-width:360px;z-index:1100"></div>

<script src="js/tour.js"></script>
<script src="js/dashboard.js"></script>
<link rel="stylesheet" href="css/chat-widget.css">
<script src="js/sockjs.min.js"></script>
<script src="js/stomp.umd.min.js"></script>
<script src="js/chat-widget.js"></script>
</body>
</html>
